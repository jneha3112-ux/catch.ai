    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        .auth-wrap {
            position: relative;

        /* Divider */

        .remember-label span { font-size: 12px; color: rgba(255,255,255,0.4); }

        /* Toggle text */

        .toggle-text span { color: #fff; cursor: pointer; font-weight: 700; }

        /* Toast */

            position: fixed; top: 24px; left: 50%; z-index: 9999;

        #toast.visible { transform: translate(-50%, 0); opacity: 1; }
        #toast.success { border-color: #10b981; color: #34d399; }

        /* Back link */
        .back-link { position:absolute; top:24px; left:24px; z-index:50; font-size:12px; color:rgba(255,255,255,0.4); text-decoration:none; display:flex; align-items:center; gap:6px; transition:color 0.2s; font-weight:600; }
        @media (min-width: 640px) {
            .back-link { position:fixed; top:32px; left:32px; }

        /* Status bar */

<div class="auth-wrap">

            @media (min-width: 640px) {

        <!-- ── LOGIN PANEL ─────────────────── -->
        <div id="panel-login" style="display:none;">

            <div class="field">

                </select>

                <input type="tel" id="s-phone" placeholder="+1 555 000 0000">
            </div>

            </div>

            <button class="btn-primary" id="btn-signup" onclick="doSignup()">

<!-- Toast -->
<div id="toast">
    <span id="toast-icon">ℹ</span>
    <span id="toast-msg">Notification</span>
</div>

<script>
// ── SUPABASE ─────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://wbibehdgvmcrpgzaxkvu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndiaWJlaGRndm1jcnBnemF4a3Z1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyOTUwMTEsImV4cCI6MjA5Mzg3MTAxMX0.0STkt1RncpWrahh5kvse8Uf9kyH61Z6ENnt1UZIiHxk';

console.log("Auth: Initializing Supabase client...");
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
});
console.log("Auth: Supabase client initialized.");

// If already logged in, skip to dashboard
(async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.replace('/dashboard.html');
})();

// ── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'info') {
    const el  = document.getElementById('toast');
    const ico = document.getElementById('toast-icon');
    const txt = document.getElementById('toast-msg');
    clearTimeout(toastTimer);
    el.className = 'visible ' + type;
    ico.textContent = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
    txt.textContent = msg;
    toastTimer = setTimeout(() => { el.className = ''; }, 4000);
}

// ── PANEL TOGGLE ─────────────────────────────────────────────────────────────
function showPanel(name) {
    const isLogin = name === 'login';
    document.getElementById('panel-login').style.display  = isLogin ? 'block' : 'none';
    document.getElementById('panel-signup').style.display = isLogin ? 'none'  : 'block';
    document.getElementById('auth-heading').textContent   = isLogin ? 'Welcome Back'    : 'Create Account';
    document.getElementById('auth-sub').textContent       = isLogin ? 'Sign in to your account' : 'Join Catch.ai today';
    gsap.from('#auth-card', { y: 10, opacity: 0.6, duration: 0.4, ease: 'power2.out' });
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
async function doLogin() {
    console.log("Auth: doLogin called.");
    const email = document.getElementById('l-email')?.value?.trim();
    const pass  = document.getElementById('l-pass')?.value;
    const btn   = document.getElementById('btn-login');

    if (!email || !pass) { 
        toast('Please fill in all fields.', 'error'); 
        return; 
    }

    if (!btn) return;
    btn.disabled = true;
    const originalText = btn.textContent;
    btn.textContent = 'Signing in...';

    try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

        if (error) {
            let msg = error.message;
            if (msg.includes('Invalid login credentials')) msg = 'Incorrect email or password.';
            if (msg.includes('Email not confirmed'))        msg = 'Please verify your email first — check your inbox.';
            toast(msg, 'error');
            btn.disabled = false;
            btn.textContent = originalText;
            return;
        }

        toast('Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/dashboard.html', 900);
    } catch(err) {
        console.error('Login error:', err);
        toast('An error occurred. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = originalText;
    }
}

// ── SIGNUP ────────────────────────────────────────────────────────────────────
async function doSignup() {
    console.log("Auth: doSignup called.");
    const fname  = document.getElementById('s-fname')?.value?.trim();
    const lname  = document.getElementById('s-lname')?.value?.trim();
    const clinic = document.getElementById('s-clinic')?.value?.trim();
    const gender = document.getElementById('s-gender')?.value;
    const phone  = document.getElementById('s-phone')?.value?.trim();
    const dob    = document.getElementById('s-dob')?.value;
    const email  = document.getElementById('s-email')?.value?.trim();
    const pass   = document.getElementById('s-pass')?.value;
    const btn    = document.getElementById('btn-signup');

    // Validation
    if (!fname || !clinic || !gender || !phone || !email || !pass) { 
        toast('Please fill in all required fields.', 'error'); 
        return; 
    }
    
    if (pass.length < 6) { 
        toast('Password must be at least 6 characters.', 'error'); 
        return; 
    }

    // Validate phone format
    const phoneRegex = /^\+?[\d\s\-()]{8,20}$/;
    if (!phoneRegex.test(phone)) {
        toast('Please enter a valid mobile number (e.g., +1 234 567 8900).', 'error');
        return;
    }

    if (!btn) return;
    btn.disabled = true;
    const originalText = btn.textContent;
    btn.textContent = 'Creating account...';

    try {
        console.log("Auth: Calling sb.auth.signUp...");
        const { data, error } = await sb.auth.signUp({
            email, password: pass,
            options: {
                data: { 
                    first_name: fname, 
                    last_name: lname, 
                    full_name: `${fname} ${lname}`.trim(),
                    clinic_name: clinic, 
                    gender,
                    phone, 
                    dob 
                },
                emailRedirectTo: window.location.origin + '/dashboard.html'
            }
        });
        console.log("Auth: sb.auth.signUp result:", { data, error });

        if (error) {
            let msg = error.message;
            if (msg.includes('already registered')) msg = 'This email is already registered. Try signing in.';
            if (msg.includes('invalid_grant')) msg = 'Email already registered. Try logging in.';
            toast(msg, 'error');
            btn.disabled = false;
            btn.textContent = originalText;
            return;
        }

        // Save extended profile data immediately (for free trial users)
        if (data.user) {
            console.log("Auth: User object found, upserting profile...");
            try {
                const trialStart = new Date().toISOString();
                const trialEnd = new Date(Date.now() + 2 * 24 * 60 * 60 * 1000).toISOString();
                
                await sb.from('profiles').upsert({
                    id: data.user.id,
                    email,
                    full_name: `${fname} ${lname}`.trim(),
                    clinic_name: clinic,
                    gender,
                    phone,
                    dob: dob || null,
                    plan: 'free',
                    trial_start: trialStart,
                    subscription_end: trialEnd,
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                });
            } catch(profileErr) { 
                console.warn('Profile creation warning:', profileErr);
            }
        }

        if (data.session) {
            toast('Account created! Welcome to Catch.ai. Entering dashboard...', 'success');
            setTimeout(() => window.location.href = '/dashboard.html', 900);
        } else {
            toast('Account created! Check your email to confirm then sign in.', 'success');
            btn.disabled = false;
            btn.textContent = originalText;
            setTimeout(() => showPanel('login'), 2500);
        }
    } catch(err) {
        console.error('Signup error:', err);
        toast('An error occurred. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = originalText;
    }
}

// ── SOCIAL AUTH ───────────────────────────────────────────────────────────────
async function doSocial(provider) {
    try {
        toast(`Opening ${provider}...`, 'info');
        const { error } = await sb.auth.signInWithOAuth({
            provider,
            options: { redirectTo: window.location.origin + '/dashboard.html' }
        });
        if (error) {
            console.error(`${provider} auth error:`, error);
            toast(`${provider} login failed. Please try another method.`, 'error');
        }
    } catch(err) {
        console.error('Social auth error:', err);
        toast('An error occurred. Please try again.', 'error');
    }
}

// ── FORGOT PASSWORD ───────────────────────────────────────────────────────────
async function triggerForgotPassword(e) {
    e.preventDefault();
    const email = document.getElementById('l-email')?.value?.trim();
    if (!email) { 
        toast('Enter your email above first, then click Forgot.', 'error'); 
        return; 
    }
    
    try {
        const { error } = await sb.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/auth.html'
        });
        if (error) {
            console.error('Reset email error:', error);
            toast(error.message || 'Failed to send reset email.', 'error');
        } else {
            toast('Password reset link sent to ' + email + '. Check your inbox.', 'success');
        }
    } catch(err) {
        console.error('Forgot password error:', err);
        toast('An error occurred. Please try again.', 'error');
    }
}

// ── SYSTEM CLOCK ─────────────────────────────────────────────────────────────
setInterval(() => {
    const n = new Date();
    document.getElementById('sys-time').textContent =
        'TIME: ' + [n.getHours(), n.getMinutes(), n.getSeconds()]
            .map(v => String(v).padStart(2,'0')).join(':');
}, 1000);

// ── THREE.JS BACKGROUND ───────────────────────────────────────────────────────
try {
    const canvas   = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 100);
    camera.position.z = 5;

    const count  = 1800;
    const pos    = new Float32Array(count * 3);
    for (let i = 0; i < count * 3; i++) pos[i] = (Math.random() - 0.5) * 14;
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat  = new THREE.PointsMaterial({ size: 0.018, color: 0xFF4500, transparent: true, opacity: 0.55 });
    const pts  = new THREE.Points(geo, mat);
    scene.add(pts);

    let mx = 0, my = 0;
    window.addEventListener('mousemove', e => {
        mx = (e.clientX / innerWidth  - 0.5) * 2;
        my = (e.clientY / innerHeight - 0.5) * 2;
        const card = document.getElementById('auth-card');
        gsap.to(card, { rotateX: -my * 4, rotateY: mx * 4, duration: 1, ease: 'power2.out' });
    });

    (function animate() {
        requestAnimationFrame(animate);
        pts.rotation.y += 0.0008;
        camera.position.x += (mx * 0.3 - camera.position.x) * 0.04;
        camera.position.y += (-my * 0.3 - camera.position.y) * 0.04;
        renderer.render(scene, camera);
    })();

    window.addEventListener('resize', () => {
        renderer.setSize(innerWidth, innerHeight);
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
    });
} catch(e) { console.warn('Three.js init failed:', e); }

// ── ENTRANCE ANIMATION ────────────────────────────────────────────────────────
gsap.from('#auth-card', { y: 50, opacity: 0, scale: 0.94, duration: 1, ease: 'power4.out', delay: 0.2 });
</script>

</body>
</html>
